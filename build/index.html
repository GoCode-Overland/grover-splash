    <style>
        /* Minimal additional styling using your color scheme */
        .build-container {
            max-width: 600px;
            margin: 4rem auto;

        }

        .chat-button {
            background-color: #66AEC0;
            color: white;
            border: none;
            padding: 1.5rem 4rem;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 8px;

            transition: background-color 0.3s ease;

        }

            color: #66AEC0;

        }
        
        .back-link:hover {
            text-decoration: underline;
        }
    </style>

    <script>
		(function (d) {
			// Load the Grover Chat embed script
			var s = d.createElement('script');
			s.src = 'https://ops.getgrover.ai/embed';
			s.async = true;
			d.head.appendChild(s);

			// Initialize once loaded
			s.onload = function () {
				if (window.GroverChat) {
					window.GroverChat.init({
						assistantId: '3eb69271-d883-440b-944c-c40afa7725df',
						apiUrl: 'https://ops.getgrover.ai' 
					}).catch(function (error) {
						console.error('Failed to initialize GroverChat:', error);
					});
				} else {
					console.error('GroverChat failed to load');
				}
			};
		})(document);
	</script>
	
</head>
<body>
    <header class="bg-primary py-6">
        <div class="container mx-auto px-4 max-w-6xl flex items-center justify-between">

        </div>
    </header>

    <div class="build-container">

        <p class="build-description">
            Chat with Grova, and we'll build you a custom assistant.
            Get personalized information for troubleshooting and traveling in your van!
        </p>

        <button class="chat-button" id="startChatButton">
            Start Building Now
        </button>
        
    </div>

    <footer class="py-16 text-center text-white bg-primary">
        <div class="flex flex-col items-center">
            <img src="../img/grover-combomark-white.svg" alt="grover logo" class="h-8 mb-4 mx-auto" loading="lazy" width="200" height="32">
            <p class="text-sm">&copy; 2026 grover. All rights reserved.</p>
        </div>
    </footer>
    
    <script>
function waitForChatWidget(callback) {
  const interval = setInterval(() => {
    const groverWidget = document.querySelector('grover-chat-widget'); // Host element
    if (groverWidget && groverWidget.shadowRoot) {
      const widgetButton = groverWidget.shadowRoot.querySelector('.chat-toggle-button');
      if (widgetButton) {
        clearInterval(interval);
        callback(widgetButton);
      }
    }
  }, 300); // Check every 300ms
}

waitForChatWidget(function(widgetButton) {
  document.getElementById('startChatButton').addEventListener('click', function() {
    widgetButton.click();
  });
});
</script>
</body>
