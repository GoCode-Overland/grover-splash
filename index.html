  <!-- GA4: delayed load, fires at most once -->
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-LN0EK30SS7', { send_page_view: false });
    let gaLoaded = false;
    function loadGA() {
      if (gaLoaded) return;
      gaLoaded = true;
      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://www.googletagmanager.com/gtag/js?id=G-LN0EK30SS7';
      document.head.appendChild(s);
      s.onload = function() { gtag('event', 'page_view'); };
    }
    if (document.readyState === 'complete') {
      setTimeout(loadGA, 1000);
    } else {
      window.addEventListener('load', function() { setTimeout(loadGA, 1000); });
    }
    ['mousedown','touchstart','keydown','scroll'].forEach(function(e) {
      document.addEventListener(e, loadGA, { once: true, passive: true });
    });
  </script>

  <!-- Grova Chat init -->
  <script>
    (function(d) {
      var s = d.createElement('script');
      s.src = 'https://ops.getgrover.ai/embed';
      s.async = true;
      d.head.appendChild(s);
      s.onload = function() {
        if (window.GroverChat) {
          window.GroverChat.init({
            assistantId: '3eb69271-d883-440b-944c-c40afa7725df',
            apiUrl: 'https://ops.getgrover.ai'
          }).catch(function(err) { console.error('GroverChat init failed:', err); });
        }
      };
    })(document);
  </script>
